# Wrangler config for vitest-pool-workers testing
# Stripped to only bindings supported by miniflare
# Full production config is in wrangler.toml
name = "the-brain-test"
# Minimal test entry — avoids agents SDK bundling issues in miniflare
# Full McpAgent DO export is in src/workers/mcpagent/index.ts (production)
main = "tests/test-entry.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "D1_US"
database_name = "brain-us-test"
database_id = "test-brain-us"
migrations_dir = "migrations"

[[r2_buckets]]
binding = "R2_ARTIFACTS"
bucket_name = "brain-artifacts-test"

[[r2_buckets]]
binding = "R2_OBSERVABILITY"
bucket_name = "brain-observability-test"

[[kv_namespaces]]
binding = "KV_SESSION"
id = "test-kv-session"

# Queues — stubbed for ingestion pipeline tests (Phase 2.1+)
[[queues.producers]]
binding = "QUEUE_HIGH"
queue = "brain-priority-high-test"

[[queues.producers]]
binding = "QUEUE_NORMAL"
queue = "brain-priority-normal-test"

[[queues.producers]]
binding = "QUEUE_BULK"
queue = "brain-priority-bulk-test"
